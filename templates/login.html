<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FinAI - AI Personal Finance Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --accent: #4cc9f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --gradient-primary: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            --gradient-accent: linear-gradient(135deg, #4cc9f0 0%, #4361ee 100%);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
            padding: 40px;
            width: 100%;
        }

        .login-card:hover {
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-primary);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            margin-right: 15px;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-label {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .form-control {
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
            width: 100%;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        .input-group {
            width: 100%;
        }

        .input-group-text {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-right: none;
            border-radius: 12px 0 0 12px !important;
        }

        .form-control.border-start-0 {
            border-left: none;
            border-radius: 0 12px 12px 0 !important;
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(67, 97, 238, 0.3);
        }

        .btn-outline-primary {
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-outline-primary:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .login-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link:hover {
            text-decoration: underline;
            color: var(--secondary);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        /* Password toggle button */
        .password-toggle-btn {
            border: 2px solid #e2e8f0;
            border-left: none;
            border-radius: 0 12px 12px 0 !important;
            background: #f8fafc;
            color: #64748b;
        }

        .password-toggle-btn:hover {
            background: #e2e8f0;
            color: var(--dark);
        }

        /* Remember me checkbox */
        .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .form-check-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.25);
        }

        /* Forgot password link */
        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            padding: 0 15px;
            color: #64748b;
            font-size: 0.9rem;
        }

        /* Security badges */
        .security-badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 0.9rem;
        }

        /* Alert messages */
        .alert {
            border-radius: 12px;
            border: none;
            padding: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .logo-icon {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
            
            .logo-text {
                font-size: 1.8rem;
            }
            
            .security-badges {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 10px;
            }
            
            .login-card {
                padding: 25px 15px;
            }
            
            .logo {
                margin-bottom: 20px;
            }
            
            .btn-primary, .btn-outline-primary {
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card animate-fade-in">
            <div class="logo">
                
                <div class="logo-text">FinAI</div>
            </div>
            {% if messages %}
            {% for message in messages %}
            <p class="text-center">{{message}}</p>
            {% endfor %}
            {% endif %}
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-2">Welcome Back</h2>
                <p class="text-muted">Sign in to your AI-powered finance manager</p>
            </div>

            <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span id="errorMessage"></span>
            </div>

            <div id="successAlert" class="alert alert-success d-none" role="alert">
                <i class="bi bi-check-circle me-2"></i>
                <span id="successMessage"></span>
            </div>
            
            <form action="{% url 'user_login' %}" method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="email_username" class="form-label">
                        <i class="bi bi-envelope me-1"></i> Username
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person text-muted"></i>
                        </span>
                        <input type="text" 
                               class="form-control" 
                               id="email_username" 
                               name="email_username" 
                               placeholder="Enter username" 
                               required
                               autofocus>
                    </div>
                    <div class="invalid-feedback">Please enter your email or username</div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-1"></i> Password
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-key text-muted"></i>
                        </span>
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               name="password" 
                               placeholder="Enter your password" 
                               required>
                        <button class="btn password-toggle-btn" type="button" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback">Please enter your password</div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
                        <label class="form-check-label small" for="remember_me">
                            Remember me
                        </label>
                    </div>
                    </div>
                
                <div class="d-grid gap-3 mb-4">
                    <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                        <span class="spinner-border spinner-border-sm d-none" id="loadingSpinner"></span>
                        <span id="submitText">Sign In</span>
                    </button>
                </div>
                
                <div class="text-center">
                    <p class="mb-0">
                        Don't have an account? 
                        <a href="{% url 'register' %}" class="login-link">Create Account</a>
                    </p>
                </div>
            </form>
        </div>
        
        <div class="security-badges mt-4">
            <div class="badge-item">
                <i class="bi bi-shield-check text-success"></i>
            </div>
            <div class="badge-item">
                <i class="bi bi-bank text-success"></i>
            </div>
            <div class="badge-item">
                <i class="bi bi-graph-up text-success"></i>
                <span>Secure Login</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

        // Show error message

            errorMessage.textContent = message;

        function showSuccess(message) {
            successMessage.textContent = message;
            successAlert.classList.remove('d-none');
            errorAlert.classList.add('d-none');
        }

        // Hide all messages
        function hideMessages() {
            errorAlert.classList.add('d-none');

</body>
</html>
